# ==========================================================================
# Template Decap CMS — à copier dans admin/config.yml de CHAQUE nouveau site
# client, puis à adapter (repo, collection, champs).
#
# Provider OAuth partagé (une seule fois pour tous les clients Devanture) :
# base_url pointe vers le projet Vercel qui héberge api/auth.js + api/callback.js
# (voir /api/auth.js et /api/callback.js à la racine du repo site-web-Devanture).
#
# Voir README.md dans ce dossier pour le pattern complet (CMS -> JSON ->
# affichage sur la page via render-example.js).
# ==========================================================================

backend:
  name: github
  repo: mon-org/nom-du-repo-client   # À ADAPTER : owner/repo GitHub du site client
  branch: main
  base_url: https://www.devanture-web.fr/api   # Provider OAuth partagé Devanture
  auth_endpoint: auth                          # -> https://www.devanture-web.fr/api/auth

# Les médias uploadés depuis le CMS (photos plats/produits) sont commités
# directement dans le repo, dans ce dossier :
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Un seul fichier JSON pour tout le catalogue/la carte (plutôt qu'un fichier
# par produit) : plus simple à relire côté site avec un seul fetch() JS
# (voir render-example.js), suffisant pour un catalogue de petit commerce.
collections:
  - name: "contenu"
    label: "Contenu du site"
    files:
      # ---------- Option A : site boutique (catalogue) ----------
      - name: "catalogue"
        label: "Catalogue produits"
        file: "content/catalogue.json"
        fields:
          - name: "produits"
            label: "Produits"
            widget: "list"
            summary: "{{title}} — {{prix}} €"
            fields:
              - { label: "Nom du produit", name: "title", widget: "string" }
              - { label: "Prix (€)", name: "prix", widget: "number", value_type: "float" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Disponible", name: "disponible", widget: "boolean", default: true }

      # ---------- Option B : site restaurant (carte) — décommenter et
      # supprimer l'option A si le client est un restaurant. ----------
      # - name: "menu"
      #   label: "Carte du restaurant"
      #   file: "content/menu.json"
      #   fields:
