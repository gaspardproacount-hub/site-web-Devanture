      #       label: "Plats"
      #       widget: "list"
      #       summary: "{{title}} ({{categorie}}) — {{prix}} €"
      #       fields:
      #         - { label: "Nom du plat", name: "title", widget: "string" }
      #         - { label: "Description", name: "description", widget: "text", required: false }
