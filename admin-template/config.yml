# ==========================================================================
# Template Decap CMS — à copier dans admin/config.yml de CHAQUE nouveau site
# client, puis à adapter (repo, collection, champs).
#
# Provider OAuth partagé (une seule fois pour tous les clients Devanture) :
# base_url pointe vers le projet Vercel qui héberge api/auth.js + api/callback.js
# (voir /api/auth.js et /api/callback.js à la racine du repo site-web-Devanture).
# ==========================================================================

backend:
  name: github
  repo: mon-org/nom-du-repo-client   # À ADAPTER : owner/repo GitHub du site client
  branch: main
  base_url: https://www.devanture-web.fr/api   # Provider OAuth partagé Devanture
  auth_endpoint: auth                          # -> https://www.devanture-web.fr/api/auth

# Les médias uploadés depuis le CMS (photos plats/produits) sont commités
# directement dans le repo, dans ce dossier :
media_folder: "images/uploads"
public_folder: "/images/uploads"

